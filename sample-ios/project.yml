name: AzureVaultSample
options:
  bundleIdPrefix: com.company.upload.sample
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"

targets:
  AzureVaultSample:
    type: application
    platform: iOS
    sources:
      - path: AzureVaultSample
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.company.upload.sample.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: AzureVaultSample/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - framework: ../upload-api/build/XCFrameworks/release/AzureVaultUploadSDK.xcframework
        embed: true
